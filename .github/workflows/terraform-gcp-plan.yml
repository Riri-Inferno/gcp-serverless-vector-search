name: terraform-gcp-plan

on:
  pull_request:
    paths:
      - 'terraform/gcp/**'
      - 'terraform/.terraform-version'
      - 'functions/**'
      - '.github/workflows/terraform-gcp-plan.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pull-requests: write

# plan と apply で state lock が競合しないよう、apply workflow と group を共有してシリアル化する。
concurrency:
  group: terraform-gcp
  cancel-in-progress: false

jobs:
  plan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/gcp
    steps:
      - uses: actions/checkout@v4

      - name: Read terraform version
        id: tfver
        working-directory: .
        run: echo "version=$(cat terraform/.terraform-version)" >> "$GITHUB_OUTPUT"

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ steps.tfver.outputs.version }}
          terraform_wrapper: false

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/1096526787406/locations/global/workloadIdentityPools/gh-actions-pool/providers/github-actions
          service_account: terraform-ci@riri-vector-lab-2026.iam.gserviceaccount.com

      # SOPS で暗号化されたシークレットを CI 内で復号する (ADR 0006)。
      # enc.yaml 未配置のフェーズ (KMS key だけ作成済み) では条件分岐で skip される。
      - name: Install SOPS
        uses: nhedger/setup-sops@v2

      - name: Decrypt secrets (skip if not yet committed)
        working-directory: .
        run: |
          mkdir -p terraform/gcp/.decrypted
          if [ -f secrets/gemini-api-key.enc.yaml ]; then
            sops decrypt secrets/gemini-api-key.enc.yaml > terraform/gcp/.decrypted/gemini-api-key.yaml
            echo "Decrypted gemini-api-key.enc.yaml"
          else
            echo "secrets/gemini-api-key.enc.yaml not present — skipping decrypt"
          fi

      - name: terraform init
        run: terraform init -input=false

      - name: terraform validate
        run: terraform validate

      - name: terraform plan
        id: plan
        continue-on-error: true
        run: |
          set -o pipefail
          terraform plan -no-color -input=false -out=tfplan 2>&1 | tee plan.txt

      - name: Sticky PR comment
        # always() を付けることで init / validate / plan のどこで落ちても PR に結果コメントを残す。
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const header = '<!-- terraform-plan-gcp -->';
            let output;
            try {
              output = fs.readFileSync('terraform/gcp/plan.txt', 'utf8');
            } catch (e) {
              output = '(plan output not available — init/validate 段階で失敗した可能性、Actions log を参照)';
            }
            if (output.length > 60000) {
              output = output.substring(0, 60000) + '\n\n... (truncated, see Actions log for full output)';
            }
            // 早期失敗 (init/validate 段階) で plan step が未実行のときは 'skipped' になる
            const statusMap = {
              success: '✅ success',
              failure: '❌ failure',
              skipped: '⏭️ skipped',
              cancelled: '🚫 cancelled'
            };

            const rawStatus = '${{ steps.plan.outcome }}' || 'skipped';
            const statusText = statusMap[rawStatus] || rawStatus;
            const body = `${header}\n### Terraform Plan: \`terraform/gcp\` — **${statusText}**\n\n<details><summary>Plan output</summary>\n\n\`\`\`hcl\n${output}\n\`\`\`\n\n</details>\n\n_workflow: \`terraform-gcp-plan.yml\` · run #${context.runNumber}_`;
            
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.data.find(c => c.body && c.body.startsWith(header));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Surface plan failure
        if: steps.plan.outcome == 'failure'
        run: exit 1
