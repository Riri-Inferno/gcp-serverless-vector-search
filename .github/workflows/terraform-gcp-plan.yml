name: terraform-gcp-plan

on:
  pull_request:
    paths:
      - 'terraform/gcp/**'
      - 'terraform/.terraform-version'
      - 'functions/**'
      - '.github/workflows/terraform-gcp-plan.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pull-requests: write

# plan と apply で state lock が競合しないよう、apply workflow と group を共有してシリアル化する。
concurrency:
  group: terraform-gcp
  cancel-in-progress: false

jobs:
  plan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/gcp
    steps:
      - uses: actions/checkout@v4

      - name: Read terraform version
        id: tfver
        working-directory: .
        run: echo "version=$(cat terraform/.terraform-version)" >> "$GITHUB_OUTPUT"

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ steps.tfver.outputs.version }}
          terraform_wrapper: false

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/1096526787406/locations/global/workloadIdentityPools/gh-actions-pool/providers/github-actions
          service_account: terraform-ci@riri-vector-lab-2026.iam.gserviceaccount.com

      - name: terraform init
        run: terraform init -input=false

      - name: terraform validate
        run: terraform validate

      - name: terraform plan
        id: plan
        continue-on-error: true
        run: |
          set -o pipefail
          terraform plan -no-color -input=false -out=tfplan 2>&1 | tee plan.txt

      - name: Sticky PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const header = '<!-- terraform-plan-gcp -->';
            let output;
            try {
              output = fs.readFileSync('terraform/gcp/plan.txt', 'utf8');
            } catch (e) {
              output = '(plan output not available — check Actions log)';
            }
            if (output.length > 60000) {
              output = output.substring(0, 60000) + '\n\n... (truncated, see Actions log for full output)';
            }
            const status = '${{ steps.plan.outcome }}';
            const body = `${header}\n### Terraform Plan: \`terraform/gcp\` — **${status}**\n\n<details><summary>Plan output</summary>\n\n\`\`\`hcl\n${output}\n\`\`\`\n\n</details>\n\n_workflow: \`terraform-gcp-plan.yml\` · run #${context.runNumber}_`;

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.data.find(c => c.body && c.body.startsWith(header));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Surface plan failure
        if: steps.plan.outcome == 'failure'
        run: exit 1
