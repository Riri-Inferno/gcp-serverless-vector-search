# SOPS encryption rules (ADR 0006).
# `sops encrypt secrets/<name>.yaml > secrets/<name>.enc.yaml` で
# 下記 KMS key で暗号化される。
#
# .sops.yaml 自体は秘密値を含まないため git に commit する。
creation_rules:
  # SOPS は `--encrypt <INPUT>` の INPUT ファイル名で creation_rules を解決する。
  # よって素ファイル (`.yaml`) にマッチするパターンが必要。
  # 暗号化後の `.enc.yaml` も同じ regex を踏むが、SOPS は再暗号化を試みないので問題なし。
  - path_regex: secrets/.*\.yaml$
    encrypted_regex: ^.*$
    gcp_kms: projects/riri-vector-lab-2026/locations/global/keyRings/sops/cryptoKeys/sops-key
